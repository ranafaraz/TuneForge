name: Init Wiki

on:
  workflow_dispatch:

jobs:
  init-wiki:
    runs-on: ubuntu-latest
    steps:
      - name: Set up git
        run: |
          git config --global user.name 'Rana Faraz'
          git config --global user.email 'faraz.ahmed@iub.edu.pk'
          git config --global init.defaultBranch master
      - name: Initialize wiki via gh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Use gh api to create initial wiki page
          # GitHub REST API v3 wiki pages endpoint
          gh api repos/ranafaraz/TuneForge/wiki/pages \
            --method POST \
            -f title='Home' \
            -f content='# TuneForge Welcome to the TuneForge wiki.' \
            -f message='docs: initialize wiki' \
            --silent || echo "Wiki API returned error (expected if not initialized)"
          
          # Try git approach with GITHUB_TOKEN
          mkdir wiki && cd wiki
          git init
          git remote add origin "https://oauth2:${GH_TOKEN}@github.com/ranafaraz/TuneForge.wiki.git"
          echo '# TuneForge' > Home.md
          git add .
          git commit -m 'docs: initialize wiki'
          git push origin master 2>&1 || echo "Push failed"