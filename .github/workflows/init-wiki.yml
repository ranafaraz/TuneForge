name: Init Wiki

on:
  workflow_dispatch:

jobs:
  init-wiki:
    runs-on: ubuntu-latest
    steps:
      - name: Set up git
        run: |
          git config --global user.name 'Rana Faraz'
          git config --global user.email 'faraz.ahmed@iub.edu.pk'
          git config --global init.defaultBranch master
      - name: Initialize wiki
        env:
          WIKI_TOKEN: ${{ secrets.WIKI_INIT_TOKEN }}
        run: |
          mkdir wiki && cd wiki
          git init
          git remote add origin "https://ranafaraz:${WIKI_TOKEN}@github.com/ranafaraz/TuneForge.wiki.git"
          printf '# TuneForge\n\nWelcome to the TuneForge wiki.\n' > Home.md
          git add .
          git commit -m 'docs: initialize wiki'
          git push -u origin master
          echo "Wiki initialized successfully"